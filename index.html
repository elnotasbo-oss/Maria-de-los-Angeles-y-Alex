<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#d9b6ad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Boda: Maria de los Angeles y Alex</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body { opacity: 0; transition: opacity 0.5s ease; font-family: 'Book Antiqua', 'Georgia', serif; color: #705E5E; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        
        #invitacion { 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

/* Estilo Reloj super compacto y minimalista */
        .reloj-container {
            display: flex; justify-content: center; gap: 4px; margin: 5px 0;
        }
        .flip-box {
            border: 1px solid #705E5E;
            color: #705E5E;
            padding: 2px; border-radius: 2px;
            text-align: center; width: 26px; /* Aún más estrecho */
        }
        .flip-box span { display: block; font-size: 12px; font-weight: bold; }
        .flip-box label { font-size: 6px; text-transform: uppercase; }
        
        @keyframes pulso {
            0% { transform: scale(1); }
            50% { transform: scale(1.015); }
            100% { transform: scale(1); }
        }

        #contenedor-sobre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2000; transition: opacity 1s ease;
        }

        #sobre {
            width: 100%; height: 100%;
            background: url('sobre-cerrado.png') no-repeat center center;
            background-size: cover; 
            cursor: pointer;
            animation: pulso 5s infinite ease-in-out;
        }

        .seccion { width: 100vw; }
        img { width: 100vw; height: auto; display: block; }
        
        #btnAudio {
            position: fixed; bottom: 20px; left: 20px;
            background: #ffffff; border: 1px solid #705E5E;
            border-radius: 50%; width: 40px; height: 40px;
            cursor: pointer; font-size: 20px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.3; transition: opacity 0.3s ease; color: #705E5E;
        }
        #btnAudio:active { opacity: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="contenedor-sobre">
        <div id="sobre"></div>
        <div style="position: absolute; top: 32%; width: 100%; display: flex; justify-content: center; pointer-events: none;">
            <lottie-player src="Arrow.json" background="transparent" speed="1" style="width: 80px; height: 80px;" loop autoplay></lottie-player>
        </div>
    </div>

    <div id="invitacion">

        <div class="seccion"><img src="imagen-1.png" alt="Sección 1"></div>
        
        <!-- Reloj movido debajo de imagen1.png -->
        <div class="reloj-container" id="cuenta-regresiva">
            <div class="flip-box"><span id="dias">0</span><label>Días</label></div>
            <div class="flip-box"><span id="horas">0</span><label>Hrs</label></div>
            <div class="flip-box"><span id="minutos">0</span><label>Min</label></div>
            <div class="flip-box"><span id="segundos">0</span><label>Seg</label></div>
        </div>

        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        
        <div style="display: flex; justify-content: center; margin: 20px 0;">
            <lottie-player src="Wedding.json" background="transparent" speed="1" style="width: 85px; height: 85px;" loop autoplay></lottie-player>
        </div>
        
        <div class="seccion"><img src="texto-1.png" alt=""></div>
           <div style="display: flex; justify-content: center; margin: 20px 0;">
            <lottie-player src="anilloss.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></lottie-player>
        </div>
<div style="background-color: rgba(255, 255, 255, 0.5); 
                padding: 15px 0; 
                margin: 20px 0; 
                width: 100%; 
                backdrop-filter: blur(5px);">
        
        <h3 style="text-align: center; color: #705E5E; margin: 0 0 10px 0; font-family: 'Book Antiqua', serif; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">
            Toca para ver la ubicación
        </h3>

        <div style="display: flex; justify-content: center; gap: 20px;">
            <style>
                @keyframes respirar { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
                .boton-ubicacion { animation: respirar 3s infinite ease-in-out; }
            </style>

            <a href="https://www.google.com/maps/place/Kil%C3%B3metro+0/@-16.4902709,-68.1437046,15.45z/data=!4m6!3m5!1s0x915f216340eecefd:0xac064cdee44eb6ab!8m2!3d-16.4959631!4d-68.1334156!16s%2Fg%2F11krs1sbsc?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="boton-ubicacion"
               style="text-decoration: none; color: #705E5E; border: 1px solid #705E5E; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; min-width: 80px;">
               ⛪<br><span style="font-size: 9px;">CATEDRAL</span>
            </a>

            <a href="https://www.google.com/maps/place/Sal%C3%B3n+de+Eventos+Green+Garden/@-16.4933943,-68.1992053,17z/data=!4m6!3m5!1s0x915edf006203fa57:0xc5ba724a5c0100b1!8m2!3d-16.4933573!4d-68.1969656!16s%2Fg%2F11x2wx2pqt?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="boton-ubicacion"
               style="text-decoration: none; color: #705E5E; border: 1px solid #705E5E; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; min-width: 80px;">
               🥂<br><span style="font-size: 9px;">SALÓN</span>
            </a>
        </div>
    </div>
    
</div>
    </div>

    <button id="btnAudio">🎵</button>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        window.onload = function() { document.body.style.opacity = '1'; };

        const fechaDestino = new Date("Nov 28, 2026 13:00:00").getTime();  
        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaDestino - ahora;
            document.getElementById("dias").innerHTML = Math.floor(distancia / (1000 * 60 * 60 * 24));
            document.getElementById("horas").innerHTML = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutos").innerHTML = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("segundos").innerHTML = Math.floor((distancia % (1000 * 60)) / 1000);
            if (distancia < 0) { clearInterval(x); document.getElementById("cuenta-regresiva").innerHTML = "¡Es hoy!"; }
        }, 1000);

        // (Resto de tu script original sin cambios)
        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        var contenedorSobre = document.getElementById("contenedor-sobre");
        audio.volume = 0.3;
        contenedorSobre.onclick = function() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            audio.play();
            contenedorSobre.style.opacity = '0';
            setTimeout(() => { contenedorSobre.style.display = 'none'; }, 1000);
        };
        btn.onclick = function() {
            if (audio.muted) { audio.muted = false; btn.innerHTML = "🎵"; } 
            else { audio.muted = true; btn.innerHTML = "🔇"; }
        };
    </script>
</body>
</html>
