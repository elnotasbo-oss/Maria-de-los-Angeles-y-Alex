<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boda: Maria de los Angeles y Alex</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
        }
        /* Contenedores de borde a borde */
        .seccion { width: 100%; display: block; }
        
        /* Imágenes: ancho total, altura proporcional (sin deformar) */
        img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: contain; 
        }
        
        /* Botón de sonido más pequeño y abajo a la derecha */
        #btnAudio {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #5a4a42; border-radius: 50%; 
            width: 40px; height: 40px;
            cursor: pointer; font-size: 16px; z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="btnAudio">🔊</button>

    <div class="seccion"><img src="imagen1.png" alt="Sección 1"></div>
    <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
    <div class="seccion"><img src="imagen2.png" alt="Sección 3"></div>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        audio.volume = 0.1;

        btn.onclick = function() {
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        };

        // Activación automática al primer clic
        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
            }
        }, { once: true });
    </script>
</body>
</html>
