<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda: Maria de los Angeles y Alex</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Las secciones ahora no tienen fondo ni márgenes restrictivos */
        .seccion { width: 100%; text-align: center; }
        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        /* Botón de sonido flotante */
        #btnAudio {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.5);
            border: none; border-radius: 50%; width: 50px; height: 50px;
            cursor: pointer; font-size: 24px; z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="btnAudio">🔊</button>

    <!-- Sección 1: Portada (sin imagen, solo diseño) -->
    <div class="seccion">
        <h1>Maria de los Angeles & Alex</h1>
    </div>

    <!-- Sección 2: Historia -->
    <div class="seccion">
        <img src="imagen1.png" alt="Nuestra Historia">
    </div>

    <!-- Sección 3: Detalles -->
    <div class="seccion">
        <img src="imagen2.png" alt="Detalles">
    </div>

    <audio id="musicaFondo" loop autoplay>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        audio.volume = 0.1;

        btn.onclick = function() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "🔊";
            } else {
                audio.pause();
                btn.innerHTML = "🔇";
            }
        };
    </script>
</body>
</html>
